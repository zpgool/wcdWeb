<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/css/homeP.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css"
      type="text/css"
    />
    <style>
      @font-face {
        font-family: "YpairingfontBd";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/YPairingFont.woff2")
          format("woff2");
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "YpairingfontBd";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/YPairingFont-Bd.woff2")
          format("woff2");
        font-weight: 700;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div class="backgroundImg">
      <img src="/img/Home_background.png" alt="" />
    </div>
    <div class="warrper">
      <div class="LogoBar">
        <img src="/img/Logo.png" alt="" />
        <span>WCD</span>
      </div>
      <nav class="navBar">
        <span><a href="">HOME</a></span>
        <span><a href="">ABOUT US</a></span>
        <span><a href="">Q&A</a></span>
        <span><a href="">APPLY</a></span>
        <span><a href="">INSTA</a></span>
      </nav>
      <div class="mainImg">
        <img src="/img/mainImg.png" alt="" />
        <span
          >우친동은 변화하는 개발 환경에 맞춰 유연하게 발전하며,<br />부담 없이
          배우고 소통하는 친근한 개발 동아리입니다.</span
        >
      </div>
      <div class="applyBtn">
        <div class="blur"></div>
        <span>지원하기</span>
      </div>
    </div>
    <span class="projectIntro"
      >우친동이 기획하고 구현한 <br />
      다양한 프로젝트들을 소개합니다.</span
    >
    <div class="projectBarWrapper">
      <div class="projectBar">
        <div><div><span>프로젝트 1</span><span>설명</span></div></div>
        <div><div><span>프로젝트 2</span><span>설명</span></div></div>
        <div><div><span>프로젝트 3</span><span>설명</span></div></div>
        <div><div><span>프로젝트 4</span><span>설명</span></div></div>
      </div>
    </div>

    <script>
      const bar = document.querySelector('.projectBar');
      let speed = 3;

      // 카드 복제해서 무한루프 효과
      const cards = [...bar.children];
      cards.forEach(card => {
        const clone = card.cloneNode(true);
        bar.appendChild(clone);
      });

      function autoScroll() {
        bar.scrollLeft += speed;

        if (bar.scrollLeft >= bar.scrollWidth / 2) {
          bar.scrollLeft = 0;
        }

        requestAnimationFrame(autoScroll);
      }

      bar.addEventListener('mouseenter', () => speed = 0);
      bar.addEventListener('mouseleave', () => speed = 3);

      autoScroll();
    </script>
  </body>
</html>
